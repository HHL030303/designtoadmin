<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Softcopy Bootstrap</title>
</head>
<body>
    <script>
        const authStorageKey = 'design-delivery-auth-user';
        const projectStorageKey = 'design-delivery-current-project';
        const roleStorageKey = 'design-delivery-project-role-map';

        const project = {
            key: 'P-001',
            id: 'P-001',
            code: 'DESIGN-DELIVERY',
            name: '设计交付管理系统演示项目',
            description: '当前账号角色：系统管理员、计划员、设计统筹',
            status: 'enabled',
            workwxBound: false,
            roles: [
                { id: 1, code: 'admin', name: '系统管理员' },
                { id: 2, code: 'planner', name: '计划员' },
                { id: 3, code: 'coordinator', name: '设计统筹' }
            ],
            permissions: []
        };

        const currentUser = {
            id: 'U-ADMIN-001',
            email: 'admin@example.com',
            name: '系统管理员',
            role: 'admin',
            status: 'enabled',
            projects: [project]
        };

        const url = new URL(window.location.href);
        const view = url.searchParams.get('view') || '/dashboard';

        window.localStorage.setItem(authStorageKey, JSON.stringify(currentUser));
        window.localStorage.setItem(projectStorageKey, JSON.stringify(project));
        window.localStorage.setItem(roleStorageKey, JSON.stringify({ 'P-001': 'admin' }));

        window.location.replace(view.startsWith('/') ? view : `/${view}`);
    </script>
</body>
</html>
